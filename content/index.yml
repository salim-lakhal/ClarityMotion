cta:
  title: Get Started Today
  description: Discover how ClarityMotion can secure your testimonials in just a few clicks.
  links:
    - label: Sign Up Free
      size: xl

faq:
  title: Frequently Asked Questions
  description: Find answers to the most common questions about ClarityMotion.
  items:
    - label: Is the service secure?
      content: Yes, ClarityMotion uses advanced cryptographic technologies to ensure complete anonymity and maximum security for all processed testimonials.
      defaultOpen: true
    - label: How do I cancel my subscription?
      content: You can cancel your subscription at any time from your dashboard. No cancellation fees apply.
    - label: Can I change my plan later?
      content: Absolutely. Our plans are flexible and can be adjusted as your needs evolve.
    - label: Do you offer refunds?
      content: We offer refunds under certain conditions. Contact our support team for more information.
    - label: Do you provide customer support?
      content: Yes, our support team is available to assist you with any questions about using ClarityMotion.

title: ClarityMotion
description: ClarityMotion is a platform specializing in secure testimonial management. Using AI and advanced cryptography, ClarityMotion anonymizes witness identity in video testimonials while preserving content authenticity through cryptographic certification.

hero:
  title: Protect Your Witnesses' Identity
  description: Secure sensitive testimonials with ClarityMotion — AI-powered anonymization and cryptographic certification for video testimonials.
  headline:
    label: Security & Ethics
    icon: i-heroicons-shield-check
  links:
    - label: Explore ClarityMotion
      icon: i-heroicons-arrow-right-20-solid
      trailing: true
      to: '#features'
      size: xl
    - label: Submit a Testimonial
      icon: i-heroicons-video-camera
      color: gray
      to: '/submit'
      size: xl

logos:
  title: Trusted by leading media organizations
  icons:
    - i-simple-icons-bbc
    - i-simple-icons-cnn
    - i-simple-icons-fox
    - i-simple-icons-nbc

features:
  headline: Features
  title: Why choose ClarityMotion?
  description: ClarityMotion provides robust testimonial protection by anonymizing witness images and voices while certifying content authenticity.
  items:
    - title: Easy to Use
      description: Intuitive interface to quickly and securely anonymize testimonials with just a few clicks.
      icon: i-heroicons-cog
    - title: Proven Reliability
      description: State-of-the-art technology to protect witnesses and guarantee testimonial authenticity.
      icon: i-heroicons-check
    - title: Maximum Security
      description: Advanced cryptography ensures unbreakable anonymization and tamper-proof certification.
      icon: i-heroicons-lock-closed
    - title: Fast Processing
      description: Video transformation and certification delivered rapidly for timely publication.
      icon: i-heroicons-rocket-launch
    - title: Affordable Plans
      description: Competitive pricing that replaces the high costs of traditional witness protection methods.
      icon: i-heroicons-currency-dollar
    - title: Scalable
      description: Adapts to the needs of small teams and large production companies alike.
      icon: i-heroicons-chart-bar

pricing:
  headline: Pricing
  title: A plan for every need
  description: Choose the plan that best fits your organization, with flexible options for all budgets.
  plans:
    - title: Basic
      description: For individuals and small projects.
      price: $300 / video minute
      align: top
      button:
        label: Get Started
        color: gray
      features:
        - Basic anonymization
        - Voice encryption
        - Temporary secure storage
    - title: Standard
      description: For mid-size teams and productions.
      price: $500 / video minute
      highlight: true
      scale: true
      align: top
      button:
        label: Get Started
      features:
        - Advanced anonymization
        - Voice & image encryption
        - Authenticity certification
    - title: Premium
      description: For large teams and high-profile projects.
      price: $800 / video minute
      align: top
      button:
        label: Get Started
        color: gray
      features:
        - Full anonymization suite
        - Military-grade encryption
        - Official ClarityMotion certificate
        - Priority support

